// ─── UI UPDATES ───
// ════════════════════════════════════════════════════════════════
const claudeDot = document.getElementById('claude-dot');
const claudeLabel = document.getElementById('claude-label');
const opBanner = document.getElementById('op-banner');
const progressBar = document.getElementById('progress-bar');
const progressFill = progressBar.querySelector('.fill');

function updateClaudeStatus(status) {
  scene.claudeStatus = status;
  claudeDot.className = 'status-dot ' + (status === 'connected' ? 'connected' :
    status === 'working' ? 'working' : 'disconnected');
  const labels = { connected: '已连接', working: '工作中', idle: '空闲', disconnected: '未连接' };
  claudeLabel.textContent = labels[status] || status;
}

function updateOpBanner(desc, type) {
  if (desc) {
    opBanner.textContent = desc;
    opBanner.className = 'operation-banner active';
  } else {
    opBanner.textContent = '就绪，等待操作...';
    opBanner.className = 'operation-banner';
  }
}

function updateProgress(current, total, label) {
  if (current != null && total) {
    progressBar.className = 'active';
    progressFill.style.width = (current / total * 100) + '%';
  } else {
    progressBar.className = '';
    progressFill.style.width = '0%';
  }
}

function updateStats() {
  let ok = 0, warn = 0, crit = 0, total = 0;
  Object.values(scene.servers).forEach(s => {
    total++;
    const st = s.metrics?.status;
    if (st === 'ok') ok++;
    else if (st === 'warning') warn++;
    else if (st === 'critical') crit++;
  });
  document.getElementById('stat-ok').innerHTML = `&#9679; ${ok}`;
  document.getElementById('stat-warn').innerHTML = `&#9679; ${warn}`;
  document.getElementById('stat-crit').innerHTML = `&#9679; ${crit}`;
  document.getElementById('stat-total').innerHTML = `&#9632; ${total}`;
}

// ════════════════════════════════════════════════════════════════
// ─── INFO PANELS (Cron / Memory / Skills) ───
// ════════════════════════════════════════════════════════════════
let activeInfoPanel = null; // 'cron' | 'memory' | 'skills' | null
let cronData = { tasks: [] };

const SKILL_ICONS = {
  'server-health-check': '🔍', 'deploy-project': '🚀',
  'analyze-logs': '📋', 'manage-nginx-ssl': '🔒',
  'manage-docker': '🐳', 'manage-cloudflare': '☁️',
  'backup-restore': '💾', 'manage-firewall': '🛡️',
};

function toggleInfoPanel(name) {
  const panelEl = document.getElementById(name + '-panel');
  if (!panelEl) return;

  // Close history if open
  if (historyPanel.classList.contains('open')) closeHistoryPanel();

  if (activeInfoPanel === name) {
    // Close current
    panelEl.classList.remove('open');
    document.body.classList.remove('panel-open');
    activeInfoPanel = null;
    syncPanelButtons();
    return;
  }

  // Close previous info panel
  if (activeInfoPanel) {
    const prev = document.getElementById(activeInfoPanel + '-panel');
    if (prev) prev.classList.remove('open');
  }

  activeInfoPanel = name;
  panelEl.classList.add('open');
  document.body.classList.add('panel-open');
  syncPanelButtons();

  // Fetch data
  if (name === 'cron') fetchCronData();
  else if (name === 'memory') fetchMemoryData();
  else if (name === 'skills') fetchSkillsData();
}

function closeInfoPanel(name) {
  const panelEl = document.getElementById(name + '-panel');
  if (panelEl) panelEl.classList.remove('open');
  if (activeInfoPanel === name) {
    activeInfoPanel = null;
    document.body.classList.remove('panel-open');
  }
  syncPanelButtons();
}

function syncPanelButtons() {
  ['cron', 'memory', 'skills'].forEach(n => {
    const btn = document.querySelector(`.action-btn[data-action="toggle-${n}"]`);
    if (btn) btn.classList.toggle('active', activeInfoPanel === n);
  });
}

// Close buttons in panel headers
document.querySelectorAll('.info-panel-close').forEach(btn => {
  btn.addEventListener('click', () => closeInfoPanel(btn.dataset.panel));
});

// Override toggleHistoryPanel to also close info panels
const _origToggleHistory = toggleHistoryPanel;
toggleHistoryPanel = function() {
  if (activeInfoPanel) {
    const prev = document.getElementById(activeInfoPanel + '-panel');
    if (prev) prev.classList.remove('open');
    activeInfoPanel = null;
    document.body.classList.remove('panel-open');
    syncPanelButtons();
  }
  _origToggleHistory();
};

// ─── Cron Data ───
async function fetchCronData() {
  try {
    const resp = await fetch('/api/cron/status');
    const data = await resp.json();
    cronData = data;
    renderCronPanel();
  } catch { renderCronPanel(); }
}

function renderCronPanel() {
  const body = document.getElementById('cron-panel-body');
  const tasks = cronData.tasks || [];
  if (tasks.length === 0) {
    body.innerHTML = '<div class="info-panel-empty">无定时任务</div>';
    return;
  }
  body.innerHTML = tasks.map(t => {
    const dotCls = t.running ? 'running' : 'stopped';
    const statusText = t.running ? '运行中' : '已停止';
    const intervalText = t.interval >= 3600 ? (t.interval / 3600) + 'h' : t.interval + 's';
    let detailHtml = `<div class="cron-detail"><span>状态：</span><span class="val">${statusText}</span></div>`;
    detailHtml += `<div class="cron-detail"><span>间隔：</span><span class="val">${intervalText}</span></div>`;
    if (t.pid) detailHtml += `<div class="cron-detail"><span>PID：</span><span class="val">${t.pid}</span></div>`;
    if (t.lastCheck) detailHtml += `<div class="cron-detail"><span>上次执行：</span><span class="val">${t.lastCheck}</span></div>`;
    if (t.nextCheck) detailHtml += `<div class="cron-detail"><span>下次执行：</span><span class="val">${t.nextCheck}</span></div>`;
    return `<div class="cron-card">
      <div class="cron-card-top">
        <span class="cron-dot ${dotCls}"></span>
        <span class="cron-name">${escapeHtml(t.name)}</span>
        ${t.pid ? `<span class="cron-pid">PID:${t.pid}</span>` : ''}
      </div>
      ${detailHtml}
    </div>`;
  }).join('');
}

// ─── Memory Data ───
async function fetchMemoryData() {
  try {
    const resp = await fetch('/api/memory');
    const data = await resp.json();
    renderMemoryPanel(data.memories || []);
  } catch { renderMemoryPanel([]); }
}

function renderMemoryPanel(memories) {
  const body = document.getElementById('memory-panel-body');
  if (memories.length === 0) {
    body.innerHTML = '<div class="info-panel-empty">无实体记忆文件</div>';
    return;
  }
  body.innerHTML = memories.map(m => {
    const issueCount = (m.issues || []).length;
    const badgeHtml = issueCount > 0
      ? `<span class="mem-badge issues">${issueCount} 问题</span>`
      : `<span class="mem-badge clean">正常</span>`;
    const issuesHtml = (m.issues || []).map(i => `<div class="mem-issue-item">${escapeHtml(i)}</div>`).join('');
    let detailHtml = '';
    if (m.os) detailHtml += `<div><span class="mem-label">OS：</span>${escapeHtml(m.os)}</div>`;
    if (m.cpu) detailHtml += `<div><span class="mem-label">CPU：</span>${escapeHtml(m.cpu)}</div>`;
    if (m.memory) detailHtml += `<div><span class="mem-label">内存：</span>${escapeHtml(m.memory)}</div>`;
    if (m.lastOp) detailHtml += `<div><span class="mem-label">最后操作：</span>${escapeHtml(m.lastOp)}</div>`;
    if (issuesHtml) detailHtml += `<div style="margin-top:6px;"><span class="mem-label">已知问题：</span>${issuesHtml}</div>`;
    return `<div class="mem-card" data-alias="${escapeHtml(m.alias)}">
      <div class="mem-card-header">
        <span class="mem-alias">${escapeHtml(m.alias)}</span>
        <span class="mem-os">${escapeHtml(m.os || '')}</span>
        <div class="mem-badges">${badgeHtml}</div>
      </div>
      <div class="mem-card-detail">${detailHtml || '<div class="info-panel-empty">无详细信息</div>'}</div>
    </div>`;
  }).join('');

  body.querySelectorAll('.mem-card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
}

// ─── Skills Data ───
async function fetchSkillsData() {
  try {
    const resp = await fetch('/api/skills');
    const data = await resp.json();
    renderSkillsPanel(data.skills || []);
  } catch { renderSkillsPanel([]); }
}

function renderSkillsPanel(skills) {
  const body = document.getElementById('skills-panel-body');
  if (skills.length === 0) {
    body.innerHTML = '<div class="info-panel-empty">无可用技能</div>';
    return;
  }
  body.innerHTML = skills.map(s => {
    const icon = SKILL_ICONS[s.name] || '🔧';
    return `<div class="skill-item" data-skill="${escapeHtml(s.name)}">
      <span class="skill-icon">${icon}</span>
      <div class="skill-info">
        <div class="skill-name">/${escapeHtml(s.name)}</div>
        <div class="skill-desc">${escapeHtml(s.description || '')}</div>
      </div>
      <span class="skill-arrow">›</span>
    </div>`;
  }).join('');

  body.querySelectorAll('.skill-item').forEach(item => {
    item.addEventListener('click', () => {
      const name = item.dataset.skill;
      cmdInput.value = '/' + name + ' ';
      cmdInput.focus();
      showActionToast('已填入 /' + name);
    });
  });
}

// ─── Canvas HUD: Cron Monitor ───
let cronHudRect = null; // for hit testing

function drawCronHUD(t) {
  const tasks = cronData.tasks || [];
  if (tasks.length === 0) return;

  const hudX = W - 12;
  const lineH = 16;
  const hudH = 26 + tasks.length * lineH + 8;
  const hudW = 160;
  const rx = hudX - hudW;
  const ry = 8;

  // CRT monitor frame
  ctx.save();

  // Outer frame
  ctx.fillStyle = 'rgba(15, 23, 42, 0.88)';
  ctx.beginPath();
  ctx.roundRect(rx - 4, ry - 4, hudW + 8, hudH + 8, 6);
  ctx.fill();
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Inner screen
  ctx.fillStyle = 'rgba(10, 14, 23, 0.95)';
  ctx.beginPath();
  ctx.roundRect(rx, ry, hudW, hudH, 4);
  ctx.fill();
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Scanline effect
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#7dd3fc';
  for (let sl = ry; sl < ry + hudH; sl += 3) {
    ctx.fillRect(rx, sl, hudW, 1);
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#475569';
  ctx.textAlign = 'left';
  ctx.fillText('CRON MONITOR', rx + 8, ry + 14);

  // Separator
  ctx.strokeStyle = '#1e293b';
  ctx.beginPath();
  ctx.moveTo(rx + 6, ry + 20);
  ctx.lineTo(rx + hudW - 6, ry + 20);
  ctx.stroke();

  // Tasks
  tasks.forEach((task, i) => {
    const ty = ry + 28 + i * lineH;

    // Status dot
    const dotColor = task.running ? '#10b981' : '#ef4444';
    const glowAlpha = task.running ? (0.6 + Math.sin(t / 600 + i) * 0.4) : 1;
    ctx.globalAlpha = glowAlpha;
    ctx.fillStyle = dotColor;
    ctx.beginPath();
    ctx.arc(rx + 14, ty, 3, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    if (task.running) {
      ctx.globalAlpha = 0.2 * glowAlpha;
      ctx.beginPath();
      ctx.arc(rx + 14, ty, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;

    // Task name
    ctx.font = '10px monospace';
    ctx.fillStyle = '#94a3b8';
    const intervalText = task.interval >= 3600 ? (task.interval / 3600) + 'h' : task.interval + 's';
    const shortName = (task.name || '').length > 10 ? task.name.slice(0, 10) + '..' : task.name;
    ctx.fillText(`${shortName}`, rx + 24, ty + 3);

    // Interval
    ctx.fillStyle = '#475569';
    ctx.textAlign = 'right';
    ctx.fillText(intervalText, rx + hudW - 8, ty + 3);
    ctx.textAlign = 'left';
  });

  ctx.restore();

  // Store hit rect
  cronHudRect = { x: rx - 4, y: ry - 4, w: hudW + 8, h: hudH + 8 };
}

// HUD hit test
function hitTestCronHUD(mx, my) {
  if (!cronHudRect) return false;
  const r = cronHudRect;
  return mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h;
}

// ════════════════════════════════════════════════════════════════
// ─── INIT ───
// ════════════════════════════════════════════════════════════════
function init() {
  resizeCanvas();
  requestAnimationFrame(render);
  wsConnect();
  // Fetch initial cron data for HUD
  fetchCronData();
  // Re-center after a brief layout settle
  setTimeout(() => { resizeCanvas(); }, 100);
}

if (document.readyState === 'complete') {
  init();
} else {
  window.addEventListener('load', init);
}
</script>
